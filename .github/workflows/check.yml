name: M3U Checker
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Check
        run: |
          pip install requests
          python3 check_script.py
      - name: Commit
        run: |
          git config user.name "actions"
          git config user.email "a@a.com"
          git add valid_sub.m3u
          git commit -m "update" || echo "no change"
          git push
